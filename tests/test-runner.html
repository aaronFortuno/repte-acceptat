<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tests — Aventures Textuals Retro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 2rem;
    }
    h1 { color: #00ff88; margin-bottom: 1.5rem; font-size: 1.2rem; }
    h2 { color: #ffcc00; margin: 1.5rem 0 0.5rem; font-size: 1rem; }
    .pass { color: #00ff88; }
    .fail { color: #ff4444; }
    .test-line { padding: 0.2rem 0; font-size: 0.85rem; }
    .summary {
      margin-top: 2rem;
      padding: 1rem;
      border: 2px solid #333;
      font-size: 1rem;
    }
    .summary.all-pass { border-color: #00ff88; }
    .summary.has-fail { border-color: #ff4444; }
  </style>
</head>
<body>
  <h1>Test Runner</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <script type="module">
    /**
     * Mini framework de tests sense dependències.
     */
    const results = document.getElementById('results');
    const summaryEl = document.getElementById('summary');
    let totalPass = 0;
    let totalFail = 0;
    let currentSuite = '';

    function describe(name, fn) {
      currentSuite = name;
      const h2 = document.createElement('h2');
      h2.textContent = name;
      results.appendChild(h2);
      fn();
    }

    function it(name, fn) {
      const div = document.createElement('div');
      div.className = 'test-line';
      try {
        fn();
        div.innerHTML = `<span class="pass">✓</span> ${name}`;
        totalPass++;
      } catch (e) {
        div.innerHTML = `<span class="fail">✗</span> ${name} — <span class="fail">${e.message}</span>`;
        totalFail++;
      }
      results.appendChild(div);
    }

    function assert(condition, msg) {
      if (!condition) throw new Error(msg || 'Assertion failed');
    }

    function assertEqual(actual, expected, msg) {
      if (actual !== expected) {
        throw new Error(msg || `Esperat ${JSON.stringify(expected)}, obtingut ${JSON.stringify(actual)}`);
      }
    }

    function assertThrows(fn, msg) {
      let threw = false;
      try { fn(); } catch (e) { threw = true; }
      if (!threw) throw new Error(msg || 'S\'esperava una excepció');
    }

    // Exposar globalment per als mòduls de test
    window._test = { describe, it, assert, assertEqual, assertThrows };

    // Carregar tests
    async function runAll() {
      await import('./engine.test.js');
      await import('./stories.test.js');

      // Resum
      summaryEl.className = 'summary ' + (totalFail === 0 ? 'all-pass' : 'has-fail');
      summaryEl.textContent = totalFail === 0
        ? `✓ Tots els tests passen (${totalPass}/${totalPass})`
        : `✗ ${totalFail} tests fallant de ${totalPass + totalFail}`;
    }

    runAll();
  </script>
</body>
</html>
